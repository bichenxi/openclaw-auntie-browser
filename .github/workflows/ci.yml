name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'openclaw-skill/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      - 'openclaw-skill/**'

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install

      - name: Type check
        run: pnpm build

  rust-check:
    name: Rust Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps (needed for tauri build info)
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Download fnm sidecar
        shell: bash
        run: |
          set -euo pipefail
          FNM_VERSION=1.38.1
          mkdir -p src-tauri/binaries
          curl -fsSL --retry 3 \
            "https://github.com/Schniz/fnm/releases/download/v${FNM_VERSION}/fnm-macos.zip" \
            -o /tmp/fnm_dl.zip
          unzip -o /tmp/fnm_dl.zip -d /tmp/fnm_extract
          cp /tmp/fnm_extract/fnm src-tauri/binaries/fnm-aarch64-apple-darwin
          chmod +x src-tauri/binaries/fnm-aarch64-apple-darwin

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --release
