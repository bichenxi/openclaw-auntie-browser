name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.name }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runs-on: macos-latest
            rust-target: aarch64-apple-darwin
            fnm-triple: aarch64-apple-darwin
            fnm-asset: fnm-macos.zip
            fnm-bin: fnm
            args: --target aarch64-apple-darwin

          - name: macOS Intel
            runs-on: macos-latest
            rust-target: x86_64-apple-darwin
            fnm-triple: x86_64-apple-darwin
            fnm-asset: fnm-macos.zip
            fnm-bin: fnm
            args: --target x86_64-apple-darwin

          - name: Windows
            runs-on: windows-latest
            rust-target: ''
            fnm-triple: x86_64-pc-windows-msvc
            fnm-asset: fnm-windows.zip
            fnm-bin: fnm.exe
            args: ''

          - name: Linux
            runs-on: ubuntu-22.04
            rust-target: ''
            fnm-triple: x86_64-unknown-linux-gnu
            fnm-asset: fnm-linux.zip
            fnm-bin: fnm
            args: ''

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux 系统依赖 ──────────────────────────────────────────────────────
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Install Rust stable (with cross target)
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Rust stable
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node / pnpm ────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend deps
        run: pnpm install

      # ── 下载 fnm sidecar ──────────────────────────────────────────────────
      - name: Download fnm sidecar
        shell: bash
        run: |
          set -euo pipefail
          FNM_VERSION=1.38.1
          ASSET="${{ matrix.fnm-asset }}"
          TRIPLE="${{ matrix.fnm-triple }}"
          BIN="${{ matrix.fnm-bin }}"
          mkdir -p src-tauri/binaries
          curl -fsSL --retry 3 \
            "https://github.com/Schniz/fnm/releases/download/v${FNM_VERSION}/${ASSET}" \
            -o /tmp/fnm_dl.zip
          unzip -o /tmp/fnm_dl.zip -d /tmp/fnm_extract
          if [[ "$BIN" == "fnm.exe" ]]; then
            cp "/tmp/fnm_extract/${BIN}" "src-tauri/binaries/fnm-${TRIPLE}.exe"
          else
            cp "/tmp/fnm_extract/${BIN}" "src-tauri/binaries/fnm-${TRIPLE}"
            chmod +x "src-tauri/binaries/fnm-${TRIPLE}"
          fi
          echo "fnm sidecar ready:"
          ls -lh src-tauri/binaries/

      # ── macOS 代码签名（可选）─────────────────────────────────────────────
      # 若需要签名，在 GitHub Secrets 中配置以下变量：
      #   APPLE_CERTIFICATE          - Base64 编码的 .p12 证书
      #   APPLE_CERTIFICATE_PASSWORD - 证书密码
      #   APPLE_SIGNING_IDENTITY     - 签名身份（如 "Developer ID Application: ..."）
      #   APPLE_ID                   - Apple ID（用于公证）
      #   APPLE_PASSWORD             - App-Specific Password
      #   APPLE_TEAM_ID              - Team ID

      # ── Tauri Build ────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Oclaw ${{ github.ref_name }}
          releaseBody: |
            ## Oclaw ${{ github.ref_name }}

            ### 安装
            - **macOS Apple Silicon**: 下载 `_aarch64.dmg`
            - **macOS Intel**: 下载 `_x64.dmg`
            - **Windows**: 下载 `_x64-setup.exe`（安装包）或 `_x64_en-US.msi`
            - **Linux**: 下载 `.AppImage`（免安装）或 `.deb` / `.rpm`

            ### macOS 安装后无法打开？

            由于应用暂未签名，macOS 会阻止首次启动。按以下步骤解除限制：

            **1. 打开终端（Terminal）**

            **2. 输入下面的命令，注意末尾有一个空格，先不要按回车：**

            ```
            sudo xattr -rd com.apple.quarantine
            ```

            **3. 将 `Oclaw` 的应用图标直接拖入终端窗口**

            终端会自动填入应用路径，最终命令看起来像这样：

            ```
            sudo xattr -rd com.apple.quarantine /Applications/Oclaw.app
            ```

            **4. 按下回车，输入 Mac 开机密码（输入时屏幕不显示字符），再按回车**

            **5. 重新打开应用即可**
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
